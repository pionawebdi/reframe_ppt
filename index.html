<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>RE:FRAME</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

#slide-wrap {
  position: fixed;
  top: 0; left: 0;
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
}
#slide-frame {
  display: block;
  width: 1920px;
  height: 1080px;
  border: none;
}

/* Keep navigation buttons fixed above the slide. */
.nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 9999;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.nav-btn:hover { background: rgba(255,255,255,0.3); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }
#btn-prev { right: calc(50% + 8px); top: auto; bottom: 28px; transform: none; }
#btn-next { right: calc(50% - 64px); top: auto; bottom: 28px; transform: none; }
</style>
</head>
<body>
<div id="slide-wrap">
  <iframe id="slide-frame" src="" scrolling="no"></iframe>
</div>

<button class="nav-btn" id="btn-prev" onclick="go(-1)">&#8592;</button>
<button class="nav-btn" id="btn-next" onclick="go(1)">&#8594;</button>

<script>
const slides = [
  { file: "deck/helix-brand-applied.slides/slides/01-cover.html", name: "Cover" },
  { file: "deck/helix-brand-applied.slides/slides/02-problem.html", name: "Problem" },
  { file: "deck/helix-brand-applied.slides/slides/03-solution.html", name: "Solution" },
  { file: "deck/helix-brand-applied.slides/slides/07b-benefits.html", name: "Benefits" },
  { file: "deck/helix-brand-applied.slides/slides/04-service-process.html", name: "Service Process" },
  { file: "deck/helix-brand-applied.slides/slides/05-ux-framework.html", name: "UX Framework" },
  { file: "deck/helix-brand-applied.slides/slides/07-ux-report.html", name: "UX Report" },
  { file: "deck/helix-brand-applied.slides/slides/06-demo.html", name: "Demo" },
  { file: "deck/helix-brand-applied.slides/slides/09-tech-stack.html", name: "Tech Stack" },
  { file: "deck/helix-brand-applied.slides/slides/10-closing.html", name: "Closing" },
];

let cur = 0;

function scale() {
  const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const wrap = document.getElementById('slide-wrap');
  wrap.style.transform = `scale(${s})`;
  wrap.style.left = ((window.innerWidth - 1920 * s) / 2) + 'px';
  wrap.style.top = ((window.innerHeight - 1080 * s) / 2) + 'px';
}

function go(d) {
  cur = Math.max(0, Math.min(slides.length - 1, cur + d));
  document.getElementById('slide-frame').src = slides[cur].file;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === slides.length - 1;
  window.focus();
}

function handleKey(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
}

// Route keyboard navigation through the parent window and iframe.
window.addEventListener('keydown', handleKey);

// iframe 클릭 후 포커스가 iframe으로 넘어가면 다시 부모로 되돌림
const frame = document.getElementById('slide-frame');
frame.addEventListener('load', () => {
  try {
    frame.contentWindow.addEventListener('keydown', handleKey);
  } catch(e) {}
});

// Keep focus available for keyboard navigation after button clicks.
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => window.focus());
});

window.addEventListener('resize', scale);
scale();
go(0);
</script>
</body>
</html>
